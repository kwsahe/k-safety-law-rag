<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>K-Safety Law RAG</title>
    <script>
      tailwind = {};
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              air: "#eaf5ff",
              mist: "#d6e9f7",
              glass: "#f3f9ff",
              blueLine: "#b9dcf6",
              ocean: "#2f94de",
              oceanDeep: "#1477c9",
              oceanSoft: "#d8ecff",
              graphite: "#1d2935",
              mutedBlue: "#7b92a8",
              danger: "#ff4e72",
            },
            boxShadow: {
              soft: "0 26px 70px rgba(74, 103, 132, 0.18)",
              float: "0 22px 55px rgba(51, 106, 151, 0.2)",
              insetSoft: "inset 0 1px 0 rgba(255,255,255,0.9)",
            },
          },
        },
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="min-h-screen bg-air text-graphite antialiased">
    <main id="auth" class="grid min-h-screen place-items-center bg-[radial-gradient(circle_at_18%_18%,#f7fbff_0,transparent_28%),radial-gradient(circle_at_82%_10%,#cfe8fb_0,transparent_24%),linear-gradient(135deg,#eaf5ff,#d9eafa)] px-5 py-8">
      <section class="w-full max-w-[460px] rounded-[30px] border border-blueLine/80 bg-glass/90 p-8 shadow-float backdrop-blur-xl">
        <div class="mb-7">
          <p class="mb-2 text-xs font-black uppercase text-ocean">K-Safety Law RAG</p>
          <h1 class="text-3xl font-black tracking-normal text-graphite">산업안전 법령 상담</h1>
          <p class="mt-3 leading-7 text-mutedBlue">사고 시나리오를 저장하고 법령 RAG 답변을 대화 이력으로 관리합니다.</p>
        </div>
        <form id="login-form" class="grid gap-4">
          <label class="grid gap-2 text-sm font-bold text-mutedBlue">
            아이디
            <input id="login-username" class="rounded-2xl border border-blueLine/70 bg-white/90 px-4 py-3 text-graphite outline-none transition focus:border-ocean focus:ring-4 focus:ring-oceanSoft" autocomplete="username" value="admin" />
          </label>
          <label class="grid gap-2 text-sm font-bold text-mutedBlue">
            비밀번호
            <input id="login-password" class="rounded-2xl border border-blueLine/70 bg-white/90 px-4 py-3 text-graphite outline-none transition focus:border-ocean focus:ring-4 focus:ring-oceanSoft" type="password" autocomplete="current-password" value="admin1234" />
          </label>
          <button type="submit" class="min-h-12 rounded-2xl bg-ocean px-5 font-black text-white shadow-float transition hover:bg-oceanDeep">로그인</button>
        </form>
        <form id="register-form" class="mt-7 grid gap-4 border-t border-blueLine/50 pt-6">
          <p class="text-sm font-black text-mutedBlue">일반 계정 생성</p>
          <label class="grid gap-2 text-sm font-bold text-mutedBlue">
            아이디
            <input id="register-username" class="rounded-2xl border border-blueLine/70 bg-white/90 px-4 py-3 text-graphite outline-none transition focus:border-ocean focus:ring-4 focus:ring-oceanSoft" autocomplete="username" />
          </label>
          <label class="grid gap-2 text-sm font-bold text-mutedBlue">
            비밀번호
            <input id="register-password" class="rounded-2xl border border-blueLine/70 bg-white/90 px-4 py-3 text-graphite outline-none transition focus:border-ocean focus:ring-4 focus:ring-oceanSoft" type="password" autocomplete="new-password" />
          </label>
          <button type="submit" class="min-h-12 rounded-2xl bg-oceanSoft px-5 font-black text-oceanDeep transition hover:bg-blue-100">계정 만들기</button>
        </form>
        <p id="auth-message" class="mt-5 text-sm font-semibold text-danger"></p>
      </section>
    </main>

    <main id="app" class="hidden h-screen grid-cols-[338px_minmax(0,1fr)] gap-6 overflow-hidden bg-[radial-gradient(circle_at_8%_12%,#f7fbff_0,transparent_24%),radial-gradient(circle_at_88%_10%,#cfe8fb_0,transparent_26%),linear-gradient(135deg,#eaf5ff,#d9eafa)] p-6 lg:grid">
      <aside class="grid min-h-0 grid-rows-[auto_auto_auto_auto_1fr_auto] gap-4 rounded-[34px] border border-blueLine/80 bg-glass/82 p-5 shadow-float backdrop-blur-xl">
        <div class="flex min-h-14 items-center gap-3">
          <span class="grid h-12 w-12 place-items-center rounded-full bg-ocean text-lg font-black text-white shadow-float">K</span>
          <div>
            <strong class="block text-base font-black text-graphite">K-Safety RAG</strong>
            <small id="user-badge" class="text-xs font-bold text-mutedBlue"></small>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-1 rounded-full border border-blueLine/60 bg-oceanSoft/55 p-1 shadow-insetSoft">
          <button id="mode-scenario" class="min-h-10 rounded-2xl px-3 text-sm font-black transition">시나리오</button>
          <button id="mode-general" class="min-h-10 rounded-2xl px-3 text-sm font-black transition">일반 법령</button>
        </div>
        <button id="new-chat" class="min-h-11 rounded-2xl bg-ocean px-4 font-black text-white shadow-float transition hover:bg-oceanDeep">새 상담</button>
        <button id="scenario-open" class="min-h-11 rounded-2xl border border-blueLine/70 bg-white/75 px-4 font-black text-oceanDeep shadow-sm transition hover:bg-oceanSoft">시나리오 입력</button>
        <nav id="conversation-list" class="conversation-scroll grid content-start gap-3 overflow-auto pt-2"></nav>
        <button id="logout" class="min-h-11 rounded-2xl border border-blueLine/70 bg-white/75 px-4 font-black text-mutedBlue transition hover:bg-oceanSoft/70">로그아웃</button>
      </aside>

      <section class="grid min-h-0 grid-rows-[auto_1fr_auto] overflow-hidden rounded-[38px] border border-blueLine/80 bg-white shadow-float backdrop-blur-xl">
        <header class="flex min-h-20 items-center justify-between border-b border-blueLine/55 bg-[#f3f9ff] px-7 py-4 backdrop-blur">
          <div>
            <p class="mb-1 text-xs font-black uppercase text-ocean">Legal RAG Assistant</p>
            <h2 id="chat-title" class="text-2xl font-black text-graphite">새 상담</h2>
          </div>
          <div class="flex items-center gap-2">
            <div id="mode-indicator" class="rounded-full bg-oceanSoft px-4 py-2 text-xs font-black text-oceanDeep">시나리오 상담</div>
            <div id="admin-indicator" class="hidden rounded-full bg-[#edf2f5] px-4 py-2 text-xs font-black text-slate-600">CLI 전체 출력</div>
          </div>
        </header>
        <div id="messages" class="message-scroll grid content-start gap-5 overflow-auto px-7 py-7"></div>
        <form id="chat-form" class="grid grid-cols-[1fr_auto] gap-3 border-t border-blueLine/55 bg-[#f3f9ff] px-7 py-5 backdrop-blur">
          <textarea id="question" class="max-h-40 min-h-12 resize-none rounded-3xl border border-blueLine/70 bg-white/90 px-5 py-3 leading-7 text-graphite outline-none transition focus:border-ocean focus:ring-4 focus:ring-oceanSoft" rows="1" placeholder="질문을 입력하세요"></textarea>
          <button id="send" type="submit" class="min-h-12 rounded-3xl bg-ocean px-7 font-black text-white shadow-float transition hover:bg-oceanDeep disabled:cursor-wait disabled:opacity-60">전송</button>
        </form>
      </section>

      <section id="scenario-panel" class="hidden fixed inset-y-5 right-5 z-20 w-[min(540px,calc(100vw-40px))] overflow-auto rounded-[32px] border border-blueLine/80 bg-glass/95 p-6 shadow-float backdrop-blur-xl">
        <div class="mb-5 flex items-start justify-between gap-4">
          <div>
            <p class="mb-1 text-xs font-black uppercase text-ocean">Scenario</p>
            <h2 class="text-2xl font-black text-graphite">사고 시나리오</h2>
          </div>
          <button id="scenario-close" class="grid h-10 w-10 place-items-center rounded-full bg-oceanSoft text-2xl font-black text-oceanDeep">×</button>
        </div>
        <div class="grid gap-4">
          <label class="grid gap-2 text-sm font-bold text-mutedBlue">
            사고 개요
            <textarea id="scenario-overview" class="rounded-2xl border border-blueLine/70 bg-white/90 px-4 py-3 leading-7 text-graphite outline-none focus:border-ocean focus:ring-4 focus:ring-oceanSoft" rows="6"></textarea>
          </label>
          <label class="grid gap-2 text-sm font-bold text-mutedBlue">
            사고 경위
            <textarea id="scenario-details" class="rounded-2xl border border-blueLine/70 bg-white/90 px-4 py-3 leading-7 text-graphite outline-none focus:border-ocean focus:ring-4 focus:ring-oceanSoft" rows="8"></textarea>
          </label>
          <label class="grid gap-2 text-sm font-bold text-mutedBlue">
            근로자 현황
            <textarea id="scenario-workers" class="rounded-2xl border border-blueLine/70 bg-white/90 px-4 py-3 leading-7 text-graphite outline-none focus:border-ocean focus:ring-4 focus:ring-oceanSoft" rows="8"></textarea>
          </label>
          <button id="scenario-save" class="min-h-12 rounded-2xl bg-ocean px-5 font-black text-white shadow-float transition hover:bg-oceanDeep">저장</button>
          <p id="scenario-message" class="text-sm font-semibold text-oceanDeep"></p>
        </div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
